<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form action="" class="inscripcion">
        <h1>formulario de Inscripcion</h1>
        <div class="formulary">
            <label for="number">Identificacion:</label>
            <input type="number" id="number" name="number" placeholder="digite su numero de identificacion">
        </div>
        <div class="formulary">
            <label for="name">Nombres:</label>
            <input type="text" id="name" name="name" placeholder="digite sus nombres">
        </div>
        <div class="formulary">
            <label for="apellido">Apellidos:</label>
            <input type="text" id="apellido" name="apellido" placeholder="digite sus apellidos">
        </div>
        <div class="formulary">
            <label for="fecha">Fecha de nacimiento:</label>
            <input type="date" id="fecha" name="fecha">
        </div>
        <div class="formulary">
            <label for="sexo">Sexo:</label>
            <input type="radio" id="sexo" name="sexo" value="masculino">Masculino
            <input type="radio" id="sexo" name="sexo" value="femenino">Femenino
        </div>
        <div class="formulary">
            <label for="txtdirrecion">Dirrecion:</label>
            <input type="text" id="txtdirrecion" name="txtdirrecion" placeholder="digite su dirrecion">
        </div>
        <div class="formulary">
            <label for="profesion">Profesion:</label>
            <input type="text" id="profesion" name="profesion" placeholder=" digite cual es su profesion">
        </div>
        <div class="formulary">
            <label for="aficiones">Aficiones:</label>
            <textarea  id="aficiones" name="aficiones" placeholder="Ejemplo: Leer, viajar, cocinar...">
            </textarea>
        </div>
        <button type="submit"  id="btn">Enviar</button>
    </form>
</body>
</html>
